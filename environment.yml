# conda で環境を作る: conda env create -f environment.yml
# 有効化: conda activate deckAi
name: deckAi
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  - pip:
    - openai>=1.0.0
    - Pillow>=10.0.0
    - python-dotenv>=1.0.0
    - pykakasi>=2.0.0
    - pypdf>=4.0.0
    - selenium>=4.0.0
    - webdriver-manager>=4.0.0
